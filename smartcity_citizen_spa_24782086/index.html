<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Pasir Sakti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .spa-container {
            min-height: calc(100vh - 80px);
        }

        .border-dashed {
            border-style: dashed !important;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Form Laporan Warga
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm">
                        <input type="hidden" id="reportId">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" class="form-control" id="reportTitle"
                                placeholder="Contoh: Jalan berlubang di pertigaan" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kategori</label>
                            <select class="form-select" id="reportCategory" required>
                                <option value="INFRASTRUKTUR">Infrastruktur</option>
                                <option value="KEAMANAN">Keamanan</option>
                                <option value="KESEHATAN">Kesehatan</option>
                                <option value="LINGKUNGAN">Lingkungan</option>
                                <option value="LAINNYA">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Deskripsi Kejadian</label>
                            <textarea class="form-control" id="reportDescription" rows="3"
                                placeholder="Ceritakan detailnya di sini..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Lokasi</label>
                            <input type="text" class="form-control" id="reportLocation"
                                placeholder="Contoh: Jl. Sudirman depan Pasar" required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                                <i class="bi bi-save me-1"></i> Simpan Draft
                            </button>
                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit">
                                <i class="bi bi-send-fill me-1"></i> Ajukan Laporan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>

</html>
