name: Deploy GitHub Pages

on:
  push:
    branches:
      - main  # Ganti jadi master jika nama branch utama GitHub kamu adalah master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # TARGET PATH: Mengarah langsung ke folder frontend SPA milikmu
          path: './smartcity_citizen_spa_24782086'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4