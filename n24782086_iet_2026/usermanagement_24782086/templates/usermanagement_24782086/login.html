{% extends 'base.html' %}

{% block title %}Login - Smart City Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Login Smart City</h4>
            </div>
            <div class="card-body p-4">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Masuk</button>
                </form>
                <hr>
                <p class="text-center mb-0">Belum punya akun? <a href="{% url 'register' %}"
                        class="text-primary text-decoration-none">Daftar sebagai Citizen</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
