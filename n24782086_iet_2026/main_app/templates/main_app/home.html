<!DOCTYPE html>
<html>

<head>
    <title>Smart City - Daftar Laporan</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        .btn {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
            display: inline-block;
        }

        .btn-add {
            background: #28a745;
            color: white;
            margin-bottom: 15px;
        }

        .btn-edit {
            background: #ffc107;
            color: black;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }
    </style>
</head>

<body>
    <nav><a href="{% url 'home' %}">Home</a> | <a href="/about/">About</a></nav>
    <hr>
    <h1>Daftar Laporan Masalah Kota</h1>
    <a href="{% url 'add_report' %}" class="btn btn-add">+ Tambah Laporan</a>

    <table>
        <tr>
            <th>Judul</th>
            <th>Kategori</th>
            <th>Lokasi</th>
            <th>Aksi</th>
        </tr>
        {% for report in reports %}
        <tr>
            <td>{{ report.title }}</td>
            <td>{{ report.category }}</td>
            <td>{{ report.location }}</td>
            <td>
                <a href="{% url 'edit_report' report.pk %}" class="btn btn-edit">Edit</a>
                <a href="{% url 'delete_report' report.pk %}" class="btn btn-delete">Hapus</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
