<!DOCTYPE html>
<html>

<head>
    <title>Konfirmasi Hapus</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Hapus Laporan?</h1>
    <p>Apakah Anda yakin ingin menghapus laporan: <strong>{{ report.title }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; padding: 10px;">Ya, Hapus Permanen</button>
    </form>
    <br>
    <a href="{% url 'home' %}">Batal</a>
</body>

</html>
