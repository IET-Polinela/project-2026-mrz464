<!DOCTYPE html>
<html>

<head>
    <title>Edit Laporan - Smart City</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>

<body>
    <h1>Edit Laporan: {{ object.title }}</h1>
    <hr>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #ffc107; padding: 10px; border: none; cursor: pointer;">Update
            Laporan</button>
    </form>
    <br>
    <a href="{% url 'report_list' %}">Batal dan Kembali</a>
</body>

</html>
