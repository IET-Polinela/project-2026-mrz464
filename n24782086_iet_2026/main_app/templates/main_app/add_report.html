<!DOCTYPE html>
<html>

<head>
    <title>Tambah Laporan</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>

<body>
    <h1>Buat Laporan Baru</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #28a745; color: white; padding: 10px;">Simpan</button>
    </form>
    <br>
    <a href="{% url 'home' %}">Batal</a>
</body>

</html>
