{% extends 'base.html' %}

{% block title %}Edit Laporan - Pasir Sakti Smart City{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}"
                class="text-decoration-none text-smartcity">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 fw-bold text-smartcity"><i class="bi bi-note-beaming"></i> Edit Aduan</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" onsubmit="return handleFormSubmit(this)">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm" id="submitBtn">
                            <i class="bi bi-save"></i> Perbarui Laporan
                        </button>
                        <a href="{% url 'report_list' %}" class="btn btn-outline-secondary px-4">
                            Batal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function handleFormSubmit(form) {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Memperbarui...';
        btn.classList.add('disabled');
        return true;
    }
</script>
{% endblock %}
